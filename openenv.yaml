spec_version: "1.0"
name: "vichaar-core"
description: >
  A research-grade multi-agent reinforcement learning environment where five
  specialized AI agents (Profit, Ethics, PR, Legal, Risk) coordinate through
  discussion, voting, and adaptive learning to navigate complex business
  scenarios with conflicting stakeholder objectives.
version: "2.0.0"
entry_point: "core.env:Env"
app: "server.app:app"

# OpenEnv API methods
api:
  reset: "reset"
  step: "step"
  state: "state"

# Inference script
inference: "inference.py"

# Action space — 12 discrete business actions
action_space:
  type: "discrete"
  size: 12
  actions:
    - increase_production
    - delay_launch
    - invest_in_safety
    - launch_fast
    - reduce_cost
    - lobby_regulators
    - pr_campaign
    - green_innovation
    - outsource_tasks
    - employee_training
    - market_research
    - vulnerability_audit

# Observation space
observation_space:
  type: "dict"
  keys:
    - scenario
    - phase
    - metrics
    - entities
    - events
    - history
    - step_count
    - agent_messages
    - metrics_trend

# Tasks (easy → chaotic)
tasks:
  - id: "task_easy"
    name: "Software Update Rollout"
    description: "Low conflict: Simple software update to improve efficiency."
    difficulty: 1
    max_steps: 10
    grader: "evaluation.grader:grade_easy"

  - id: "task_medium"
    name: "Personalized Targeting"
    description: "Privacy vs Profit conflict requiring balanced deliberation."
    difficulty: 3
    max_steps: 15
    grader: "evaluation.grader:grade_medium"

  - id: "task_hard"
    name: "Arctic Deep Mining"
    description: "Extreme risk and high-return litigation/extraction conflict."
    difficulty: 5
    max_steps: 20
    grader: "evaluation.grader:grade_hard"

  - id: "task_adversarial"
    name: "Corporate Hostile Takeover"
    description: "Multi-party shareholder and worker stakeholder conflict."
    difficulty: 7
    max_steps: 20
    grader: "evaluation.grader:grade_adversarial"

  - id: "task_chaotic"
    name: "Global Supply Chain Collapse"
    description: "High-uncertainty overlapping world crises."
    difficulty: 10
    max_steps: 25
    grader: "evaluation.grader:grade_chaotic"

# Baseline scores (strategic system: CEO + Coordinator + SafeMode)
baselines:
  strategic:
    easy: 0.450
    medium: 0.350
    hard: 0.380
    adversarial: 0.210
    chaotic: 0.050
    mean: 0.288

meta:
  tags: ["agentic", "multi-agent", "ethics", "business", "RL", "memory", "explainable"]
  author: "Hridyansh"
  license: "MIT"
