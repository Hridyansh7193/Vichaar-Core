spec_version: 1
name: "vichaar-core"
entry_point: "core.env:Env"
version: "1.0"

tasks:
  - id: easy
    description: basic
    max_steps: 10
    grader:
      type: scalar
      evaluation: |
        m = observation["metrics"]
        return max(0.0, min(1.0, float(
          (m["expected_profit"] + m["public_sentiment"] + (1 - m["legal_risk"])) / 3
        )))

  - id: medium
    description: medium
    max_steps: 15
    grader:
      type: scalar
      evaluation: |
        m = observation["metrics"]
        return max(0.0, min(1.0, float(
          (m["expected_profit"] + (1 - m["legal_risk"]) + m["public_sentiment"]) / 3
        )))

  - id: hard
    description: hard
    max_steps: 20
    grader:
      type: scalar
      evaluation: |
        m = observation["metrics"]
        return max(0.0, min(1.0, float(
          (m["expected_profit"] + (1 - m["env_impact"]) + (1 - m["legal_risk"])) / 3
        )))
