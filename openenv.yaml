spec_version: 1
name: "vichaar-core"
description: >
  A research-grade multi-agent reinforcement learning environment where five
  specialized AI agents (Profit, Ethics, PR, Legal, Risk) coordinate through
  discussion, voting, and adaptive learning to navigate complex business
  scenarios with conflicting stakeholder objectives.
version: "2.0.0"
type: space
runtime: fastapi
app: "server.app:app"
entry_point: "core.env:Env"

api:
  reset: "reset"
  step: "step"
  state: "state"

inference: "inference.py"

action_space:
  type: "discrete"
  size: 12
  actions:
    - increase_production
    - delay_launch
    - invest_in_safety
    - launch_fast
    - reduce_cost
    - lobby_regulators
    - pr_campaign
    - green_innovation
    - outsource_tasks
    - employee_training
    - market_research
    - vulnerability_audit

observation_space:
  type: "dict"
  keys:
    - scenario
    - phase
    - metrics
    - entities
    - events
    - history
    - step_count
    - agent_messages
    - metrics_trend

tasks:
  - id: easy
    name: Software Update Rollout
    description: Low conflict scenario with focus on efficiency
    max_steps: 10
    grader:
      type: scalar
      evaluation: |
        m = observation["metrics"]
        score = (
          m["expected_profit"] +
          m["public_sentiment"] +
          (1 - m["legal_risk"])
        ) / 3
        return max(0.0, min(1.0, float(score)))

  - id: medium
    name: Personalized Targeting
    description: Balance profit and legal/privacy risk
    max_steps: 15
    grader:
      type: scalar
      evaluation: |
        m = observation["metrics"]
        score = (
          m["expected_profit"] +
          (1 - m["legal_risk"]) +
          m["public_sentiment"]
        ) / 3
        return max(0.0, min(1.0, float(score)))

  - id: hard
    name: Arctic Deep Mining
    description: High-risk scenario balancing profit, environment, and legal constraints
    max_steps: 20
    grader:
      type: scalar
      evaluation: |
        m = observation["metrics"]
        score = (
          m["expected_profit"] +
          (1 - m["env_impact"]) +
          (1 - m["legal_risk"])
        ) / 3
        return max(0.0, min(1.0, float(score)))

baselines:
  strategic:
    easy: 0.45
    medium: 0.35
    hard: 0.38
    mean: 0.39

meta:
  tags:
    [
      "agentic",
      "multi-agent",
      "ethics",
      "business",
      "RL",
      "memory",
      "explainable",
    ]
  author: "Hridyansh"
  license: "MIT"
